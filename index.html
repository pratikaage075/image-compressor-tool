<!DOCTYPE html>
<html>
<head>
<title>Image Compressor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="top-bar">
<h2>Image Compressor</h2>
<button id="darkToggle">Dark Mode</button>
</div>

<div id="dropArea">
<p>Drag & Drop Image Here</p>
<input type="file" id="fileInput" accept="image/*">
<button id="selectBtn">Select Image</button>
</div>

<div class="preview-section">

<div>
<h3>Original</h3>
<img id="originalPreview">
<p id="originalSize"></p>
</div>

<div>
<h3>Compressed</h3>
<img id="compressedPreview">
<p id="compressedSize"></p>
</div>

</div>

<div class="controls">
<label>Compression Quality</label>
<input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">
</div>

<button id="compressBtn">Compress Image</button>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<a id="downloadBtn">Download Compressed Image</a>

</div>

<script src="script.js"></script>

</body>
</html>
